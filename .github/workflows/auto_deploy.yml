on:
  push:
    tags:
      - "v*" # Push events to matching v*, i.e. v1.0, v20.15.10

jobs:
  build:
    name: Upload Release Asset
    runs-on: ubuntu-latest
    env:
      RELEASE_ASSET_NAME: GovieTools.zip
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Release Folder
        run: rsync -av --exclude='.git/' --exclude='.github/' --exclude='.gitignore' . ./${{ github.event.repository.name }}

      - name: Zip Release Folder
        run: |
          zip -r "$RELEASE_ASSET_NAME" "${{ github.event.repository.name }}"

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: ${{ github.ref }}
          draft: false
          prerelease: false

      - name: Upload Release Asset
        id: upload-release-asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }} # This pulls from the CREATE RELEASE step above, referencing it's ID to get its outputs object, which include a `upload_url`. See this blog post for more info: https://jasonet.co/posts/new-features-of-github-actions/#passing-data-to-future-steps
          asset_path: ./${{ env.RELEASE_ASSET_NAME }}
          asset_name: ${{ env.RELEASE_ASSET_NAME }}
          asset_content_type: application/zip
